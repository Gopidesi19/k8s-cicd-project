replicaCount: 2

image:
  repository: asia-south1-docker.pkg.dev/my-devops-project-1/flask-app-repo/flask-app
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: LoadBalancer
  port: 80
  targetPort: 5000

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

env:
  ENVIRONMENT: production
  APP_VERSION: "1.0.0"

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

ingress:
  enabled: false
  className: nginx
  host: flask.example.com

serviceAccount:
  create: true
  name: ""

secret:
  enabled: false
  data: {}
